                    <i class="fas fa-lock" style="margin-right: 8px;"></i>
                    Confirmar Contraseña
                </label>
                <div class="password-container">
                    <input type="password" id="confirmPassword" placeholder="Confirma tu contraseña">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                        <i class="fas fa-eye"></i>

            </div>

            <button id="resetBtn" onclick="resetPasswordPreview()" class="reset-btn">

            <option value="recoverEmail">🔄 Recuperar Email</option>

    <script>
        // Función para mostrar/ocultar contraseña
        window.togglePassword = function (inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');

            if (!input || !icon) return;

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }

            input.focus();
        }

        // Actualizar medidor de fortaleza
        function checkPasswordStrength(password) {
            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) score++;
            return score;
        }

        function updateStrengthBar(password) {
            const strengthBar = document.getElementById('strengthBar');
            if (!strengthBar) return;
            const score = checkPasswordStrength(password);
            strengthBar.className = 'strength-bar';
            if (score === 0) {
                strengthBar.style.width = '0%';
            } else if (score <= 2) {
                strengthBar.style.width = '33%';
                strengthBar.classList.add('strength-weak');
            } else if (score <= 4) {
                strengthBar.style.width = '66%';
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.style.width = '100%';
                strengthBar.classList.add('strength-strong');
            }
        }

        // Simulación de reset de contraseña (solo para preview)
        window.resetPasswordPreview = function () {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetMessage = document.getElementById('resetMessage');
            const resetBtn = document.getElementById('resetBtn');
            const resetBtnText = document.getElementById('resetBtnText');
            const resetBtnLoader = document.getElementById('resetBtnLoader');

            if (!newPassword || !confirmPassword) {
                resetMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> Por favor, completa todos los campos.';
                resetMessage.className = 'message message-error';
                resetMessage.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                resetMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> Las contraseñas no coinciden.';
                resetMessage.className = 'message message-error';
                resetMessage.style.display = 'block';
                return;
            }

            const strength = checkPasswordStrength(newPassword);
            if (strength < 3) {
                resetMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> Contraseña muy débil. Usa mayúsculas, minúsculas, números y símbolos.';
                resetMessage.className = 'message message-error';
                resetMessage.style.display = 'block';
                return;
            }

            // Simular éxito
            resetBtn.disabled = true;
            resetBtnText.style.display = 'none';
            resetBtnLoader.style.display = 'inline';
            resetMessage.style.display = 'none';

            setTimeout(() => {
                resetMessage.innerHTML = '<i class="fas fa-check-circle"></i> ¡Contraseña cambiada exitosamente! Redirigiendo al login...';
                resetMessage.className = 'message message-success';
                resetMessage.style.display = 'block';
                document.getElementById('resetPasswordForm').style.display = 'none';
                document.getElementById('actionButtons').style.display = 'flex';
                document.getElementById('status').className = 'status-icon success';
                document.getElementById('status').innerHTML = '<i class="fas fa-check-circle"></i>';
                document.getElementById('title').textContent = '¡Contraseña Cambiada!';
            }, 500);
        }

        // Cambiar vista previa
        function changePreview() {
            const value = document.getElementById('previewSelect').value;
            const statusEl = document.getElementById('status');
            const titleEl = document.getElementById('title');
            const messageEl = document.getElementById('message');
            const resetForm = document.getElementById('resetPasswordForm');
            const actionButtons = document.getElementById('actionButtons');
            const resetMessage = document.getElementById('resetMessage');

            // Resetear todo
            resetForm.style.display = 'none';
            actionButtons.style.display = 'none';
            messageEl.style.display = 'none';
            if (resetMessage) resetMessage.style.display = 'none';
            statusEl.classList.remove('success', 'error', 'warning', 'loading');
            
            // Configurar según opción
            switch(value) {
                case 'loading':
                    statusEl.classList.add('loading');
                    statusEl.innerHTML = '<i class="fas fa-circle-notch"></i>';
                    titleEl.textContent = 'Procesando solicitud...';
                    break;
                    
                case 'verifyEmail':
                    statusEl.classList.add('success');
                    statusEl.innerHTML = '<i class="fas fa-check-circle"></i>';
                    titleEl.textContent = '¡Email Verificado!';
                    messageEl.innerHTML = '<i class="fas fa-check-circle"></i> Tu correo electrónico ha sido verificado exitosamente. Ya puedes iniciar sesión.';
                    messageEl.className = 'message message-success';
                    messageEl.style.display = 'block';
                    actionButtons.style.display = 'flex';
                    break;
                    
                case 'verifyEmailError':
                    statusEl.classList.add('error');
                    statusEl.innerHTML = '<i class="fas fa-times-circle"></i>';
                    titleEl.textContent = 'Error de Verificación';
                    messageEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> El enlace de verificación ha expirado. Solicita un nuevo correo de verificación.';
                    messageEl.className = 'message message-error';
                    messageEl.style.display = 'block';
                    actionButtons.style.display = 'flex';
                    break;
                    
                case 'resetPassword':
                    statusEl.classList.add('warning');
                    statusEl.innerHTML = '<i class="fas fa-lock"></i>';
                    titleEl.textContent = 'Restablecer Contraseña';
                    messageEl.innerHTML = '<i class="fas fa-info-circle"></i> Ingresa tu nueva contraseña a continuación. El enlace expirará en 1 hora.';
                    messageEl.className = 'message message-info';
                    messageEl.style.display = 'block';
                    resetForm.style.display = 'block';
                    // Resetear inputs
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    updateStrengthBar('');
                    break;
                    
                case 'resetPasswordSuccess':
                    statusEl.classList.add('success');
                    statusEl.innerHTML = '<i class="fas fa-check-circle"></i>';
                    titleEl.textContent = '¡Contraseña Cambiada!';
                    messageEl.innerHTML = '<i class="fas fa-check-circle"></i> ¡Contraseña cambiada exitosamente! Redirigiendo al login...';
                    messageEl.className = 'message message-success';
                    messageEl.style.display = 'block';
                    actionButtons.style.display = 'flex';
                    break;
                    
                case 'resetPasswordError':
                    statusEl.classList.add('error');
                    statusEl.innerHTML = '<i class="fas fa-times-circle"></i>';
                    titleEl.textContent = 'Error';
                    messageEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> El enlace ha expirado. Solicita uno nuevo.';
                    messageEl.className = 'message message-error';
                    messageEl.style.display = 'block';
                    actionButtons.style.display = 'flex';
                    break;
                    
                case 'recoverEmail':
                    statusEl.classList.add('success');
                    statusEl.innerHTML = '<i class="fas fa-check-circle"></i>';
                    titleEl.textContent = '¡Email Recuperado!';
                    messageEl.innerHTML = '<i class="fas fa-check-circle"></i> Tu correo electrónico ha sido recuperado exitosamente. El email anterior ha sido restaurado.';
                    messageEl.className = 'message message-success';
                    messageEl.style.display = 'block';
                    actionButtons.style.display = 'flex';
                    break;
                    
                case 'recoverEmailError':
                    statusEl.classList.add('error');
                    statusEl.innerHTML = '<i class="fas fa-times-circle"></i>';
                    titleEl.textContent = 'Error de Recuperación';
                    messageEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> El enlace de recuperación ha expirado. Solicita uno nuevo.';
                    messageEl.className = 'message message-error';
                    messageEl.style.display = 'block';
                    actionButtons.style.display = 'flex';
                    break;
                    
                case 'accessError':
                    statusEl.classList.add('warning');
                    statusEl.innerHTML = '<i class="fas fa-search"></i>';
                    titleEl.textContent = 'Acceso Incorrecto';
                    messageEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Esta página requiere un enlace especial. Accede mediante el enlace enviado a tu correo.';
                    messageEl.className = 'message message-info';
                    messageEl.style.display = 'block';
                    actionButtons.style.display = 'flex';
                    break;
            }
        }

        // Evento para medidor de fuerza en el input de nueva contraseña
        document.addEventListener('DOMContentLoaded', function() {
            const newPasswordInput = document.getElementById('newPassword');
            if (newPasswordInput) {
                newPasswordInput.addEventListener('input', function() {
                    updateStrengthBar(this.value);
                });
            }
            // Iniciar con la vista de carga por defecto
            changePreview();
        });
    </script>

    <!-- COMPONENTES -->
    <script type="module" src="/components/themeloader.js"></script>
    <script type="module" src="/components/particulas.js"></script>
</body>
