<body>
    <canvas id="particle-canvas"></canvas>

    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Contenedor principal -->
    <div class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <h1>
                <i class="fas fa-map-marked-alt"></i>
                Mapa de Alertas en Vivo
            </h1>
            <div class="header-description">
                Visualiza en tiempo real las incidencias activas y las sucursales con el color de su región
            </div>
        </div>

        <!-- Contenedor del mapa -->
        <div class="map-fullscreen">
            <!-- Mapa -->
            <div id="mapa"></div>

            <!-- Panel superior izquierdo - Título mini -->
            <div class="map-header-panel">
                <h1>
                    <i class="fas fa-map-marked-alt"></i>
                    CENTINELA
                </h1>
                <div class="stats-mini">
                    <span><i class="fas fa-exclamation-triangle" style="color: #ff4444;"></i> <span
                            id="statAltasMini">0</span></span>
                    <span><i class="fas fa-exclamation-circle" style="color: #ffbb33;"></i> <span
                            id="statMediasMini">0</span></span>
                    <span><i class="fas fa-info-circle" style="color: #00C851;"></i> <span
                            id="statBajasMini">0</span></span>
                    <span><i class="fas fa-store" style="color: #2f8cff;"></i> <span
                            id="statSucursalesMini">0</span></span>
                </div>
            </div>

            <!-- Panel selector de región -->
            <div class="region-selector-panel">
                <button class="region-selector-btn" id="btnSeleccionarRegion">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Seleccionar una Región</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="region-dropdown" id="regionDropdown">
                    <div class="dropdown-header">
                        <i class="fas fa-palette"></i>
                        <span>Regiones disponibles</span>
                    </div>
                    <div class="region-list" id="regionList">
                        <div class="loading-regions">
                            <i class="fas fa-spinner fa-spin"></i> Cargando regiones...
                        </div>
                    </div>
                    <div class="dropdown-footer" id="limpiarFiltroRegion">
                        <i class="fas fa-undo-alt"></i> Mostrar todas las sucursales
                    </div>
                </div>
            </div>

            <!-- Panel de incidencias -->
            <div class="incidencias-panel" id="incidenciasPanel">
                <div class="incidencias-header" id="toggleIncidencias">
                    <h3>
                        <i class="fas fa-bell"></i>
                        Últimas Incidencias
                        <span class="badge-count" id="incidenciasBadge">0</span>
                    </h3>
                    <i class="fas fa-chevron-down" id="incidenciasChevron"></i>
                </div>
                <div class="incidencias-list" id="listaIncidencias">
                    <div class="no-incidencias">
                        <i class="fas fa-check-circle"></i> Sin incidencias activas
                    </div>
                </div>
            </div>
            <!-- Panel inferior derecho - Botones de control -->
            <div class="control-panel">
                <button class="control-btn" id="btnCentrarMapa">
                    <i class="fas fa-crosshairs"></i>
                    <span>Centrar</span>
                </button>
                <button class="control-btn" id="btnRefrescarRegiones">
                    <i class="fas fa-sync-alt"></i>
                    <span>Actualizar</span>
                </button>
            </div>

            <!-- Leyenda -->
            <div class="legend-panel">
                <div class="legend-title">LEYENDA</div>
                <div class="legend-colors">
                    <div class="legend-item">
                        <i class="fas fa-circle" style="color: #ff4444;"></i>
                        <span>Crítica</span>
                    </div>
                    <div class="legend-item">
                        <i class="fas fa-circle" style="color: #ff8844;"></i>
                        <span>Alta</span>
                    </div>
                    <div class="legend-item">
                        <i class="fas fa-circle" style="color: #ffbb33;"></i>
                        <span>Media</span>
                    </div>
                    <div class="legend-item">
                        <i class="fas fa-circle" style="color: #00C851;"></i>
                        <span>Baja</span>
                    </div>
                    <div class="legend-item">
                        <i class="fas fa-store" style="color: #2f8cff;"></i>
                        <span>Sucursal</span>
                    </div>
                </div>
            </div>


        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/components/autenticador.js"></script>
