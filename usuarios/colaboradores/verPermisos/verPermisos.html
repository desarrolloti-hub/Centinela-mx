<body>
    <canvas id="particle-canvas"></canvas>
    <br>

    <!-- Contenedor principal -->
    <div class="custom-container">
        <!-- Header -->
        <div class="header-section">
            <div class="header-content">
                <h1 class="main-title">
                    <i class="fas fa-eye"></i>
                    Ver Detalle de Permiso
                </h1>
                <div class="header-description-text">
                    "Visualiza toda la información del permiso"
                </div>
            </div>
        </div>

        <!-- ============================================= -->
        <!-- INFORMACIÓN DEL PERMISO (SOLO LECTURA) -->
        <!-- ============================================= -->
        <div class="form-row">
            <div class="full-width">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-info-circle"></i>Información del Permiso</h5>
                        <button id="btnVolverLista" class="btn-volver">
                            <i class="fas fa-arrow-left"></i>Volver a la lista
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="form-grid">
                            <!-- Grid de 2 columnas para la información -->
                            <div class="full-width">
                                <h6 class="section-title"><i class="fas fa-info-circle"></i>Información Básica</h6>
                            </div>

                            <!-- Organización (solo lectura) -->
                            <div class="full-width">
                                <label for="infoOrganizacion" class="form-label">Organización</label>
                                <div class="input-group">
                                    <span class="input-group-icon"><i class="fas fa-building"></i></span>
                                    <input type="text" class="form-control" id="infoOrganizacion" readonly value="-">
                                </div>
                            </div>

                            <!-- Área -->
                            <div class="full-width">
                                <label for="infoArea" class="form-label">Área</label>
                                <div class="input-group">
                                    <span class="input-group-icon"><i class="fas fa-building"></i></span>
                                    <input type="text" class="form-control" id="infoArea" readonly value="-">
                                </div>
                            </div>

                            <!-- Cargo -->
                            <div class="full-width">
                                <label for="infoCargo" class="form-label">Cargo</label>
                                <div class="input-group">
                                    <span class="input-group-icon"><i class="fas fa-user-tie"></i></span>
                                    <input type="text" class="form-control" id="infoCargo" readonly value="-">
                                </div>
                            </div>

                            <!-- Fecha Creación -->
                            <div class="full-width">
                                <label for="infoFechaCreacion" class="form-label">Fecha Creación</label>
                                <div class="input-group">
                                    <span class="input-group-icon"><i class="fas fa-calendar-alt"></i></span>
                                    <input type="text" class="form-control" id="infoFechaCreacion" readonly value="-">
                                </div>
                            </div>

                            <!-- Última Actualización -->
                            <div class="full-width">
                                <label for="infoFechaActualizacion" class="form-label">Última Actualización</label>
                                <div class="input-group">
                                    <span class="input-group-icon"><i class="fas fa-calendar-check"></i></span>
                                    <input type="text" class="form-control" id="infoFechaActualizacion" readonly
                                        value="-">
                                </div>
                            </div>

                            <!-- Sección de Módulos -->
                            <div class="full-width">
                                <h6 class="section-title" style="margin-top: 10px;">
                                    <i class="fas fa-lock"></i>Módulos del Sistema
                                </h6>
                            </div>

                            <!-- Grid de módulos -->
                            <div class="full-width">
                                <div class="modulos-grid" id="modulosContainer">
                                    <!-- Se llenará dinámicamente -->
                                </div>
                            </div>
                        </div>

                        <!-- Mensaje informativo -->
                        <div class="alert alert-info" style="margin-top: 20px;">
                            <i class="fas fa-info-circle"></i>
                            Visualización de permisos asignados por área y cargo.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <br>

    <!-- Scripts -->
    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script src="/components/navbarColaborador.js"></script>

<script src="/components/protector-colaborador.js" data-modulo="permisos"></script>
</body>

</html>
