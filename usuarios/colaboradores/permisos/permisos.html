<body>
    <canvas id="particle-canvas"></canvas>

    <!-- Contenedor principal -->
    <div class="admin-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>
                <i class="fas fa-shield-alt"></i>
                Gestión de Permisos
            </h1>
            <div class="header-description">
                Administra los permisos por área y cargo. Define a qué módulos puede acceder cada rol en tu
                organización.
            </div>
        </div>

        <!-- Barra de búsqueda -->
        <div class="filtros-container">
            <div class="filtros-header">
                <h5><i class="fas fa-search"></i> Buscar permisos:</h5>
            </div>
            <div class="filtros-body">
                <div class="filtro-grupo">
                    <label for="buscarPermiso">Área o cargo</label>
                    <input type="text" id="buscarPermiso" class="filtro-input" placeholder="Escribe para buscar"
                        autocomplete="off">
                </div>
                <div class="filtro-acciones">
                    <button class="btn-buscar" id="btnBuscarPermiso">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button class="btn-limpiar" id="btnLimpiarBusqueda">
                        <i class="fas fa-times"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Tabla de Permisos -->
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-lock"></i> Lista de Permisos</h5>
                <a href="../crearPermisos/crearPermisos.html" class="btn-nuevo-permiso-header" id="addBtn">
                    <i class="fas fa-plus"></i> Nuevo Permiso
                </a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table" id="tablaPermisos">
                        <thead>
                            <tr>
                                <th>Área</th>
                                <th>Cargo</th>
                                <th>Permisos</th>
                                <th style="width: 180px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="permisosTableBody">
                            <!-- Se llenará dinámicamente por permisos.js -->
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <div class="pagination-container">
                    <div class="pagination-info" id="paginationInfo"></div>
                    <nav>
                        <ul class="pagination" id="pagination">
                            <!-- Se llenará dinámicamente -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <br>

    <!-- Scripts -->
    <script type="module" src="/components/autenticador.js"></script>

    <!-- Protector de página -->
