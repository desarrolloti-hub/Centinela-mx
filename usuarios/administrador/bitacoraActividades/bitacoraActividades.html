<body>
    <canvas id="particle-canvas"></canvas>
    <br>

    <div class="custom-container">
        <div class="header-section">
            <div class="header-content">
                <h1 class="main-title">
                    <i class="fas fa-history"></i>
                    Bitácora de Actividades
                </h1>
                <div class="header-description-text">
                    <i class="fas fa-clock"></i>
                    Registro detallado de todas las acciones realizadas en el sistema
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="full-width">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-calendar-alt"></i>Filtro por Fecha</h5>
                        <button id="btnVolverDashboard" class="btn-volver">
                            <i class="fas fa-arrow-left"></i>Volver al Dashboard
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="calendario-container">
                            <h6 class="section-title">
                                <i class="fas fa-calendar-day"></i>
                                Selecciona una fecha
                            </h6>
                            <div class="calendario-wrapper">
                                <input type="text" id="calendario" placeholder="Selecciona una fecha...">
                                <div class="fecha-info">
                                    <span class="fecha-actual">
                                        <i class="fas fa-calendar-check"></i>
                                        <span id="fechaSeleccionada">Hoy</span>
                                    </span>
                                    <span id="totalActividades" class="badge">0 actividades</span>
                                </div>
                            </div>
                        </div>

                        <div class="actividades-container">
                            <h6 class="section-title">
                                <i class="fas fa-stream"></i>
                                Actividades del día
                            </h6>
                            <div class="actividades-lista" id="listaActividades">
                                <div class="sin-actividades">
                                    <i class="fas fa-calendar-day"></i>
                                    <p>No hay actividades registradas para esta fecha</p>
                                    <small>Selecciona otra fecha en el calendario</small>
                                </div>
                            </div>
                        </div>

                        <div class="action-buttons-container">
                            <button type="button" class="btn btn-primary" id="btnRefrescar">
                                <i class="fas fa-sync-alt"></i>Refrescar
                            </button>
                            <button type="button" class="btn btn-primary" id="btnHoy">
                                <i class="fas fa-calendar-day"></i>Ver Hoy
                            </button>
                            <!-- SOLO UN BOTÓN: PDF del Día -->
                            <button type="button" class="btn btn-primary" id="btnGenerarPDF">
                                <i class="fas fa-file-pdf"></i>PDF del Día
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <br>

    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script type="module" src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerAdministrador.js"></script>
    <script type="module" src="bitacoraActividades.js"></script>    
    <script src="/components/protector-admin.js"> </script>

</body>
</body>

</html>
