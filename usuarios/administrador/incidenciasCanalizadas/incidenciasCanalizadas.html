<body>
    <canvas id="particle-canvas"></canvas>

    <div class="admin-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>
                <i class="fas fa-directions"></i>
                Incidencias Canalizadas
            </h1>
            <div class="header-description" id="headerDescripcion">



            </div>
        </div>

        <!-- Filtros rápidos -->
        <div class="filtros-container">
            <div class="filtros-header">
                <h5><i class="fas fa-filter"></i> Filtrar incidencias canalizadas:</h5>
            </div>
            <div class="filtros-body">
                <div class="filtro-grupo">
                    <label for="filtroEstado">Estado</label>
                    <select id="filtroEstado" class="filtro-select">
                        <option value="todos">Todos los estados</option>
                        <option value="pendiente">Pendientes</option>
                        <option value="en_proceso">En Proceso</option>
                        <option value="finalizada">Finalizadas</option>
                        <option value="cancelada">Canceladas</option>
                    </select>
                </div>
                <div class="filtro-grupo">
                    <label for="filtroRiesgo">Nivel de Riesgo</label>
                    <select id="filtroRiesgo" class="filtro-select">
                        <option value="todos">Todos</option>
                        <option value="bajo">Bajo</option>
                        <option value="medio">Medio</option>
                        <option value="alto">Alto</option>
                        <option value="critico">Crítico</option>
                    </select>
                </div>
                <div class="filtro-grupo">
                    <label for="filtroSucursal">Sucursal</label>
                    <select id="filtroSucursal" class="filtro-select">
                        <option value="todos">Todas</option>
                    </select>
                </div>
                <div class="filtro-grupo filtro-acciones">
                    <button class="btn-filtrar" id="btnFiltrar">
                        <i class="fas fa-search"></i> Filtrar
                    </button>
                    <button class="btn-limpiar" id="btnLimpiarFiltros">
                        <i class="fas fa-times"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Tabla de Incidencias Canalizadas -->
        <div class="card">
            <div class="card-header">
                <h5>
                    <i class="fas fa-list"></i>
                    Incidencias canalizadas a mi área
                </h5>
                <div class="header-actions">
                    <button class="btn-refrescar" id="btnRefrescar" title="Actualizar lista">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <span class="badge-canalizada" id="badgeAreaInfo">
                        <i class="fas fa-layer-group"></i> Canalizadas
                    </span>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table" id="tablaIncidenciasCanalizadas">
                        <thead>
                            <tr>
                                <th>ID / Folio</th>
                                <th>Sucursal</th>
                                <th>Categoría</th>
                                <th>Subcategoría</th>
                                <th>Riesgo</th>
                                <th>Estado</th>
                                <th>Fecha Canalización</th>
                                <th>Origen</th>
                                <th style="width: 140px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaIncidenciasBody">
                            <!-- Se llenará dinámicamente -->
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <div class="pagination-container">
                    <div class="pagination-info" id="paginationInfo"></div>
                    <nav>
                        <ul class="pagination" id="pagination">
                            <!-- Se llenará dinámicamente -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de detalles de canalización -->
    <div class="modal" id="modalDetallesCanalizacion">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5><i class="fas fa-info-circle"></i> Detalles de Canalización</h5>
                    <button type="button" class="btn-close" onclick="cerrarModalCanalizacion()">&times;</button>
                </div>
                <div class="modal-body" id="modalCanalizacionBody">
                    <!-- Contenido dinámico -->
                </div>
            </div>
        </div>
    </div>
    <br>

    <!-- Scripts -->
    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script type="module" src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerAdministrador.js"></script>
    <!-- JS específico de colaboradores -->
    <script type="module" src="incidenciasCanalizadas.js"></script>    
    <script src="/components/protector-admin.js"> </script>
</body>
