<body>
    <canvas id="particle-canvas"></canvas>

    <div class="admin-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>
                <i class="fas fa-store-alt"></i> Gestión de Sucursales
            </h1>
            <div class="header-description">
                Administra las sucursales de tu organización. Puedes agregar, editar y ver detalles de cada sucursal.
            </div>
        </div>

        <!-- Barra de búsqueda -->
        <div class="filtros-container">
            <div class="filtros-header">
                <h5><i class="fas fa-search"></i> Buscar sucursales:</h5>
            </div>
            <div class="filtros-body">
                <div class="filtro-grupo">
                    <label for="buscarSucursal">Nombre, ubicación o contacto</label>
                    <input type="text" id="buscarSucursal" class="filtro-input" placeholder="Escribe para buscar"
                        autocomplete="off">
                </div>
                <div class="filtro-acciones">
                    <button class="btn-buscar" id="btnBuscarSucursal">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button class="btn-limpiar" id="btnLimpiarBusqueda">
                        <i class="fas fa-times"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Card contenedor de la tabla (estilo categorías) -->
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-store"></i> Lista de Sucursales</h5>
                <button class="btn-agregar-sucursal" id="addBtn">
                    <i class="fas fa-plus"></i> Agregar Sucursal
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table" id="tablaSucursales">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Tipo</th>
                                <th>Ubicación</th>
                                <th>Contacto</th>
                                <th>Fecha Creación</th>
                                <th style="width: 140px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="branchesTableBody">
                            <!-- Se llenará dinámicamente -->
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <div class="pagination-container">
                    <div class="pagination-info" id="paginationInfo"></div>
                    <nav>
                        <ul class="pagination" id="pagination">
                            <!-- Se llenará dinámicamente -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <br>
