<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Eventos | Centinela</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="/components/personalization/personalization.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="./monitoreo.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="admin-container">
        <div class="page-header">
            <h1><i class="fas fa-shield-alt"></i> Monitoreo de Eventos</h1>
            <div class="header-description">Visualiza y atiende los eventos de tus paneles de control en tiempo real</div>
        </div>

        <div class="panel-info-bar" id="panelInfoBar">
            <div class="panel-info">
                <div class="panel-badge"><i class="fas fa-microchip"></i><span id="cuentaInfo">Cargando...</span></div>
                <div class="panel-badge"><i class="fas fa-building"></i><span id="organizacionInfo"></span></div>
            </div>
            <div class="auto-refresh">
                <label class="refresh-toggle"><input type="checkbox" id="autoRefreshToggle" checked><span><i class="fas fa-sync-alt"></i> Auto-refresh (30s)</span></label>
                <button class="btn-buscar" id="refreshBtn" style="padding: 8px 16px;"><i class="fas fa-rotate"></i> Actualizar</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card" data-filter="all"><div class="stat-icon total"><i class="fas fa-chart-bar"></i></div><div class="stat-content"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total Eventos</div></div></div>
            <div class="stat-card" data-filter="pendiente"><div class="stat-icon pending"><i class="fas fa-clock"></i></div><div class="stat-content"><div class="stat-value" id="statPendientes">0</div><div class="stat-label">Pendientes</div></div></div>
            <div class="stat-card" data-filter="alarma"><div class="stat-icon alarm"><i class="fas fa-bell"></i></div><div class="stat-content"><div class="stat-value" id="statAlarmas">0</div><div class="stat-label">Alarmas</div></div></div>
            <div class="stat-card" data-filter="atendido"><div class="stat-icon attended"><i class="fas fa-check-circle"></i></div><div class="stat-content"><div class="stat-value" id="statAtendidos">0</div><div class="stat-label">Atendidos</div></div></div>
        </div>

        <div class="filtros-container">
            <div class="filtros-header"><h5><i class="fas fa-filter"></i> Filtros de Monitoreo</h5></div>
            <div class="filtros-body">
                <div class="filtro-grupo">
                    <label for="buscarEvento">Buscar por descripción o panel</label>
                    <input type="text" id="buscarEvento" class="filtro-input" placeholder="Ej: Medical Alarm, 250726..." autocomplete="off">
                </div>
                <div class="filtro-acciones">
                    <button class="btn-buscar" id="btnBuscarEvento"><i class="fas fa-search"></i> Buscar</button>
                    <button class="btn-limpiar" id="btnLimpiarBusqueda"><i class="fas fa-times"></i> Limpiar</button>
                </div>
            </div>
        </div>

        <div class="quick-filters" id="quickFilters">
            <div class="filter-chip active" data-filter="all"><i class="fas fa-list"></i> Todos</div>
            <div class="filter-chip" data-filter="pendiente"><i class="fas fa-clock"></i> Pendientes</div>
            <div class="filter-chip" data-filter="alarma"><i class="fas fa-bell"></i> Alarmas</div>
            <div class="filter-chip" data-filter="atendido"><i class="fas fa-check-circle"></i> Atendidos</div>
            <div class="filter-chip" data-filter="hoy"><i class="fas fa-calendar-day"></i> Hoy</div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-history"></i> Línea de Tiempo de Eventos</h5>
                <span id="eventCount" style="color: var(--color-text-secondary);">0 eventos</span>
            </div>
            <div class="card-body">
                <div class="events-timeline" id="eventsTimeline"></div>
                <div class="pagination-container" id="paginationContainer">
                    <div class="pagination-info" id="paginationInfo"></div>
                    <nav><ul class="pagination" id="pagination"></ul></nav>
                </div>
            </div>
        </div>
    </div>

    <template id="atenderEventoTemplate">
        <div style="text-align: left; padding: 10px;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--color-text-primary);"><i class="fas fa-comment"></i> Mensaje de respuesta (opcional)</label>
                <textarea id="mensajeRespuesta" rows="3" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--color-border-light); border-radius: 8px; color: var(--color-text-primary); resize: vertical;" placeholder="Ej: Se notificó al cliente, Enviando técnico..."></textarea>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 8px; color: var(--color-text-primary);"><i class="fas fa-user-check"></i> Acción a realizar</label>
                <div style="display: flex; gap: 10px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;"><input type="radio" name="accionEvento" value="atender" checked><span style="color: #2ecc71;"><i class="fas fa-check-circle"></i> Marcar como Atendido</span></label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;"><input type="radio" name="accionEvento" value="ignorar"><span style="color: #95a5a6;"><i class="fas fa-ban"></i> Marcar como Ignorado</span></label>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script type="module" src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerAdministrador.js"></script>
    <script type="module" src="monitoreo.js"></script>
    <script src="/components/protector-admin.js"></script>
</body>
</html>
