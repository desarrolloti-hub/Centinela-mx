<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Paneles | Centinela</title>

    <link rel="stylesheet" href="/components/personalization/personalization.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="listarPaneles.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <canvas id="particle-canvas"></canvas>

    <div class="page-header">
        <h1>
            <i class="fas fa-tachometer-alt"></i> Mis Paneles
        </h1>
        <div class="header-description">
            Selecciona un panel para gestionarlo
        </div>
    </div>

    <div class="edit-main-container">
        <div class="edit-wrapper" style="max-width: 900px;">
            <div class="edit-right-panel">
                <header class="edit-header">
                    <h1 class="edit-main-title">PANELES VINCULADOS</h1>
                    <p class="edit-sub-title">
                        Cuenta: <span id="cuentaEmail">-</span> | App ID: <span id="cuentaAppId">-</span>
                    </p>
                </header>

                <!-- Información de la cuenta -->
                <div class="info-card">
                    <div class="info-header">
                        <i class="fas fa-network-wired"></i>
                        <span>Cuenta de Monitoreo</span>
                    </div>
                    <div class="info-content">
                        <div class="info-row">
                            <span class="info-label">Email:</span>
                            <span class="info-value" id="cuentaEmailInfo">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">App ID:</span>
                            <code class="info-value" id="cuentaAppIdInfo">-</code>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Organización:</span>
                            <span class="info-value" id="cuentaOrganizacion">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Paneles vinculados:</span>
                            <span class="info-value" id="totalPaneles">0</span>
                        </div>
                    </div>
                </div>

                <!-- Barra de acciones para selección múltiple -->
                <div class="actions-bar" style="display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;">
                    <button id="btnSelectAll" class="action-btn" style="background: rgba(0, 255, 255, 0.15); border: 1px solid #00ffff; color: #00ffff;">
                        <i class="fas fa-check-double"></i> SELECCIONAR TODOS
                    </button>
                    <button id="btnDeselectAll" class="action-btn" style="background: rgba(255, 100, 100, 0.15); border: 1px solid #ff6666; color: #ff6666;">
                        <i class="fas fa-times"></i> DESELECCIONAR TODOS
                    </button>
                    <button id="btnMonitorSelected" class="action-btn" style="background: linear-gradient(135deg, #00aa44, #006633); color: white; display: none;">
                        <i class="fas fa-play-circle"></i> MONITOREAR SELECCIONADOS
                    </button>
                </div>

                <!-- También agrega este contador donde quieras mostrar los seleccionados -->
                <div class="info-row">
                    <span class="info-label">Paneles seleccionados:</span>
                    <span class="info-value" id="selectedCount">0</span>
                </div>

                <!-- Lista de paneles -->
                <div class="paneles-section">
                    <div class="section-header">
                        <h3><i class="fas fa-microchip"></i> Paneles disponibles</h3>
                        <button class="btn-refresh" id="btnRefresh">
                            <i class="fas fa-sync-alt"></i> Actualizar
                        </button>
                    </div>

                    <div class="paneles-grid" id="panelesGrid">
                        <div class="loading-paneles">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span>Cargando paneles...</span>
                        </div>
                    </div>
                </div>

                <!-- Botón para vincular nuevo panel -->
                <div class="action-section">
                    <button class="action-btn save-btn" id="btnVincularNuevo">
                        <i class="fas fa-plus-circle"></i> VINCULAR NUEVO PANEL
                    </button>
                </div>

                <div id="progressContainer" style="display: none;">
                    <div class="progress-info">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span id="progressMessage">Procesando...</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                </div>

                <footer class="back-btn-container">
                    <a href="/usuarios/administrador/cuentasPM/cuentasPM.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> VOLVER A GESTIÓN
                    </a>
                </footer>
            </div>
        </div>
    </div>

    <script type="module" src="/components/cargadorTemas.js"></script>
    <script src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerAdministrador.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script type="module" src="listarPaneles.js"></script>

    <!-- Protector de pagina -->
    <!-- /usuarios/administrador/cualquier-pagina.html -->
    <script src="/components/protector-admin.js" data-modulo="momitoreo"> </script>
</body>
</body>

</html>
