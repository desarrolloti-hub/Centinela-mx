<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centinela - Prueba de Notificaciones</title>
    <link rel="stylesheet" href="/components/personalization/personalization.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: var(--font-family-primary, 'Orbitron', sans-serif);
            background-color: var(--color-bg-primary, #000);
            color: var(--color-text-primary, #fff);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: var(--color-bg-secondary, rgba(0,0,0,0.5));
            padding: 30px;
            border-radius: var(--border-radius-large, 12px);
            border: 1px solid var(--color-border-light, rgba(255,255,255,0.1));
            box-shadow: var(--shadow-large, 0 10px 25px rgba(0,0,0,0.15));
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--color-accent-primary, #c0c0c0);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-text-secondary, rgba(255,255,255,0.8));
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--color-border-light, rgba(255,255,255,0.1));
            border-radius: var(--border-radius-medium, 8px);
            color: var(--color-text-primary, #fff);
            font-family: var(--font-family-secondary, sans-serif);
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background: var(--color-accent-primary, #c0c0c0);
            color: var(--color-text-dark, #000);
            border: none;
            padding: 15px 30px;
            border-radius: var(--border-radius-medium, 8px);
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: var(--transition-default, all 0.3s ease);
            font-family: var(--font-family-primary, 'Orbitron', sans-serif);
        }
        button:hover {
            background: var(--color-accent-secondary, #fff);
            transform: translateY(-2px);
            box-shadow: var(--shadow-normal, 0 5px 15px rgba(255,255,255,0.55));
        }
        .status-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--color-border-light);
            border-radius: var(--border-radius-medium);
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--color-border-light);
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .badge-enabled {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .badge-disabled {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        #responseMessage {
            margin-top: 20px;
            padding: 15px;
            border-radius: var(--border-radius-medium);
            display: none;
        }
        .success-message {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
        }
        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <h1><i class="fa-regular fa-bell"></i> Prueba de Notificaciones Push</h1>
        
        <div class="status-card">
            <h3>Estado de Notificaciones en este Dispositivo</h3>
            <!-- Dentro del div.status-card, después del h3 -->
            <div class="info-box" style="background: #ffc10720; border: 1px solid #ffc107; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                <i class="fas fa-info-circle" style="color: #ffc107;"></i>
                <span id="entornoInfo" style="color: #ffc107; margin-left: 5px;"></span>
            </div>
            <div class="status-item">
                <span><i class="fa-regular fa-bell"></i> Estado:</span>
                <span id="deviceStatusBadge" class="badge-disabled">Desactivadas</span>
            </div>
            <div class="status-item">
                <span><i class="fa-regular fa-key"></i> Token:</span>
                <span id="deviceToken" style="font-size: 12px; word-break: break-all;">No disponible</span>
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button id="enableNotificationsBtn" style="flex: 1; background: #28a745; color: white;">Activar</button>
                <button id="disableNotificationsBtn" style="flex: 1; background: #dc3545; color: white;">Desactivar</button>
            </div>
        </div>

        <h3 style="margin-top: 40px;">Enviar Notificación de Prueba</h3>
        <form id="notificationForm">
            <div class="form-group">
                <label for="userId"><i class="fa-regular fa-user"></i> Usuario Destino (ID):</label>
                <input type="text" id="userId" placeholder="ID del usuario (admin o colaborador)" required>
            </div>
            <div class="form-group">
                <label for="userType"><i class="fa-regular fa-id-card"></i> Tipo de Usuario:</label>
                <select id="userType" required>
                    <option value="administrador">Administrador</option>
                    <option value="colaborador">Colaborador</option>
                </select>
            </div>
            <div class="form-group">
                <label for="title"><i class="fa-regular fa-heading"></i> Título:</label>
                <input type="text" id="title" placeholder="Ej: Alerta de seguridad" value="Notificación de Prueba" required>
            </div>
            <div class="form-group">
                <label for="body"><i class="fa-regular fa-message"></i> Mensaje:</label>
                <textarea id="body" placeholder="Ej: Se ha reportado una nueva incidencia." required>Esta es una notificación de prueba desde el panel de administración.</textarea>
            </div>
            <div class="form-group">
                <label for="url"><i class="fa-regular fa-link"></i> URL (opcional):</label>
                <input type="text" id="url" placeholder="Ej: /usuarios/colaboradores/incidencias/incidencia123.html">
            </div>
            <button type="submit"><i class="fa-regular fa-paper-plane"></i> Enviar Notificación</button>
        </form>
        <div id="responseMessage"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="pruebasNotificaciones.js"></script>

    <!-- COMPONENTES -->
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerAdministrador.js"></script>
</body>
</html>
