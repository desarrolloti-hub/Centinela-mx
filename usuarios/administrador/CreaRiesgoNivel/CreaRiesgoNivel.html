<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear/Editar Nivel de Riesgo | Centinela C5</title>
    <link rel="stylesheet" href="/components/personalization/personalization.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="CreaRiesgoNivel.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="custom-container">
        <div class="header-section">
            <h1 class="main-title"><i class="fas fa-chart-line"></i> Nivel de Riesgo</h1>
            <div class="header-description-text">Registra o modifica un nivel de riesgo</div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-edit"></i> Información del Nivel</h5>
                <button id="btnVolverLista" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver</button>
            </div>
            <div class="card-body">
                <form id="formNivel">
                    <div class="form-group">
                        <label for="nombre">Nombre del Nivel *</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej: Alto, Crítico, Bajo..." required>
                        
                    </div>
                    <div class="form-group">
                        <label for="color">Color representativo *</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="color" class="form-control-color" value="#ff0000">
                          
                        </div>
                        <div class="form-help-text">Selecciona un color que identifique visualmente este nivel.</div>
                    </div>
                    <div class="action-buttons">
                        <button type="submit" class="btn btn-success" id="btnGuardar"><i class="fas fa-save"></i> Guardar</button>
                        <button type="button" class="btn btn-secondary" id="btnCancelar"><i class="fas fa-times"></i> Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script type="module" src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerAdministrador.js"></script>
    <script type="module" src="CreaRiesgoNivel.js"></script>
    <script src="/components/protector-admin.js"></script>
</body>
</html>
