<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinculación de Equipos | Centinela</title>
    <link rel="stylesheet" href="/components/personalization/personalization.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../registroPM/registroPM.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="page-header">
        <h1><i class="fas fa-list-check"></i> Gestión de Paneles</h1>
        <div class="header-description">Selecciona un equipo detectado para vincularlo a la plataforma.</div>
    </div>

    <div class="edit-main-container">
        <div class="edit-wrapper">
            <div class="edit-right-panel">
                <header class="edit-header">
                    <h1 class="edit-main-title">PANELES DISPONIBLES</h1>
                    <p class="edit-sub-title">Equipos vinculados a la cuenta técnica en Power Manage</p>
                </header>

                <div id="panelListContainer" style="margin-top: 20px;">
                    <div id="panelsGrid" class="panels-grid-layout">
                        <div class="message-container info">Buscando paneles en el servidor...</div>
                    </div>
                </div>

                <form class="edit-form-container" id="panelLinkForm" style="display:none; margin-top:30px; border-top: 1px solid rgba(0,255,255,0.1); padding-top:20px;">
                    <h2 class="section-title"><i class="fas fa-plug"></i> CONFIGURAR PANEL</h2>
                    
                    <div class="form-field-group">
                        <label class="field-label">NÚMERO DE SERIE</label>
                        <input class="form-input-field readonly-field" type="text" id="panelSerial" readonly>
                    </div>

                    <div class="form-field-group">
                        <label class="field-label">ALIAS PERSONALIZADO</label>
                        <input class="form-input-field" type="text" id="panelAlias" placeholder="Ej: Sucursal Chedraui 102">
                    </div>

                    <div class="form-field-group">
                        <label class="field-label">CÓDIGO MAESTRO DEL PANEL</label>
                        <input class="form-input-field" type="password" id="masterCode" placeholder="Ingresa el código del teclado" maxlength="6">
                    </div>

                    <button type="submit" class="action-btn save-btn">CONFIRMAR VINCULACIÓN</button>
                </form>

                <footer class="back-btn-container">
                    <a href="/usuarios/administrador/usuarios/usuarios.html" class="back-btn"><i class="fas fa-arrow-left"></i> VOLVER</a>
                </footer>
            </div>
        </div>
    </div>
    <script type="module" src="vincularPanel.js"></script>
    <script type="module" src="/components/autenticador.js"></script>
    <script src="/components/protector-master.js"> </script>
</body>
</html>
