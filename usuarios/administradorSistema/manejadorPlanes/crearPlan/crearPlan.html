<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Planes | Centinela</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="/components/personalization/personalization.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="stylesheet" href="./crearPlan.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <canvas id="particle-canvas"></canvas>

    <div class="admin-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>
                <i class="fas fa-cubes"></i>
                Gestión de Planes
            </h1>
            <div class="header-description">
                Crea y administra los planes disponibles para tu sistema.
                Cada plan define qué mapas estarán disponibles.
            </div>
        </div>

        <!-- Contenedor principal - Formulario centrado -->
        <div class="formulario-wrapper">
            <div class="formulario-col">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-plus-circle"></i> Crear Nuevo Plan</h5>
                    </div>
                    <div class="card-body">
                        <form id="formCrearPlan" class="plan-form">
                            <!-- Nombre del Plan -->
                            <div class="form-group">
                                <label for="planNombre">
                                    <i class="fas fa-tag"></i> Nombre del Plan
                                </label>
                                <input type="text" id="planNombre" class="form-control" placeholder="Ej: Plan Básico" required>
                            </div>

                            <!-- Descripción -->
                            <div class="form-group">
                                <label for="planDescripcion">
                                    <i class="fas fa-align-left"></i> Descripción
                                </label>
                                <textarea id="planDescripcion" class="form-control" rows="3" placeholder="Describe las características del plan..."></textarea>
                            </div>

                            <!-- Precio y Color -->
                            <div class="form-row">
                                <div class="form-group half">
                                    <label for="planPrecio">
                                        <i class="fas fa-dollar-sign"></i> Precio
                                    </label>
                                    <input type="number" id="planPrecio" class="form-control" placeholder="0.00" step="0.01" required>
                                </div>
                                <div class="form-group half">
                                    <label for="planColor">
                                        <i class="fas fa-palette"></i> Color del Plan
                                    </label>
                                    <div class="color-input-wrapper">
                                        <input type="color" id="planColor" class="color-picker" value="#0dcaf0">
                                        <span class="color-value" id="colorValue">#0dcaf0</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Selección de Mapas (Incidencias y Alertas) - MISMO TAMAÑO -->
                            <div class="form-group">
                                <label class="label-block">
                                    <i class="fas fa-puzzle-piece"></i> Selecciona los mapas del plan
                                </label>
                                <div class="modulos-checkboxes">
                                    <label class="checkbox-card">
                                        <input type="checkbox" id="mapaIncidencias" value="incidencias">
                                        <span class="checkbox-content">
                                            <i class="fas fa-exclamation-triangle"></i>
                                            <strong>Mapa Incidencias</strong>
                                            <small>Lista de incidencias, Crear incidencias, Incidencias canalizadas</small>
                                        </span>
                                    </label>
                                    <label class="checkbox-card">
                                        <input type="checkbox" id="mapaAlertas" value="alertas">
                                        <span class="checkbox-content">
                                            <i class="fas fa-map-marker-alt"></i>
                                            <strong>Mapa Alertas</strong>
                                            <small>Mapa de alertas</small>
                                        </span>
                                    </label>
                                </div>
                                <div class="info-tip" id="combinacionInfo">
                                    <i class="fas fa-info-circle"></i>
                                    <span>Selecciona uno o ambos mapas para definir el plan</span>
                                </div>
                            </div>

                            <!-- Botones de acción -->
                            <div class="form-actions">
                                <button type="submit" class="btn-primary" id="btnCrearPlan">
                                    <i class="fas fa-save"></i> Crear Plan
                                </button>
                                <button type="button" class="btn-secondary" id="btnLimpiar">
                                    <i class="fas fa-eraser"></i> Limpiar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Listado de Planes Existentes -->
        <div class="planes-listado">
            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-list"></i> Planes Creados <span id="planesCount">(0)</span></h5>
                </div>
                <div class="card-body">
                    <div id="planesContainer" class="planes-grid">
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>No hay planes creados aún. Crea tu primer plan.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-datetime">
            <i class="fas fa-sync-alt"></i>
            Última actualización: <span id="fechaActualizacion">-</span>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script type="module" src="/components/navbarSysAdmin.js"></script>
    <script src="/components/footerAdministrador.js"></script>
    <script type="module" src="./crearPlan.js"></script>
    <script src="/components/protector-master.js"> </script>
</body>

</html>
